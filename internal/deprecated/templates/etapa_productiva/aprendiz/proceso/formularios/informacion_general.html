<div class="card shadow border-0 rounded-top-0">
    <div class="card-header py-3 border-bottom-sena d-flex align-items-center justify-content-between">
        <h6 class="m-0 font-weight-bold text-sena">
            <i class="fas fa-info-circle mr-1"></i> Información General
        </h6>
        <button type="submit" form="ig-form" class="btn btn-sena btn-sm">
            <i class="fas fa-save mr-1"></i> Guardar
        </button>
    </div>
    <div class="card-body">
        <!-- El formulario se construye dinámicamente por form_builder.js -->
        <form id="ig-form" novalidate>
            <div id="ig-form-body">
                <div class="text-center py-4 text-muted">
                    <i class="fas fa-spinner fa-spin fa-2x d-block mb-2"></i>
                    Cargando formulario...
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Datos JSON para el constructor de formulario -->
<script id="ig-data" type="application/json">{{ form_ig_json | safe }}</script>

<!-- Constructor de formulario -->
<script src="{{ url_for('static', filename='js/etapa_productiva/form_builder.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        EPFormBuilder.render('ig-data', 'ig-form-body');
    });
</script>
