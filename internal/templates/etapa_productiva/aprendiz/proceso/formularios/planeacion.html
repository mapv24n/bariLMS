        <h6 class="m-0 font-weight-bold text-sena">
            <i class="fas fa-chart-line mr-1"></i> Planeación — Momento 1
        </h6>
        <button type="submit" form="m1-form" class="btn btn-sena btn-sm">
            <i class="fas fa-save mr-1"></i> Guardar
        </button>
    </div>
    <div class="card-body">
        <form id="m1-form" novalidate> <div id="m1-form-body">    <div class="text-center py-4 text-muted">

        </form>
    </div>
</div>

        EPFormBuilder.render('m1-data', 'm1-form-body');
