<div class="card shadow border-0 rounded-top-0">
    <div class="card-header py-3 border-bottom-sena d-flex align-items-center justify-content-between">
        <h6 class="m-0 font-weight-bold text-sena">
            <i class="fas fa-star-half-alt mr-1"></i> Evaluación Final — Momento 3
        </h6>
        <button type="submit" form="m3-form" class="btn btn-sena btn-sm">
            <i class="fas fa-save mr-1"></i> Guardar
        </button>
    </div>
    <div class="card-body">
        <form id="m3-form" novalidate>
            <div id="m3-form-body">
                <div class="text-center py-4 text-muted">
                    <i class="fas fa-spinner fa-spin fa-2x d-block mb-2"></i>
                    Cargando formulario...
                </div>
            </div>
        </form>
    </div>
</div>

<script id="m3-data" type="application/json">{{ form_m3_json | safe }}</script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        EPFormBuilder.render('m3-data', 'm3-form-body');
    });
</script>
