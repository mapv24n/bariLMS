{% extends "instructor/base.html" %}

{% block title %}Cambiar contraseña{% endblock %}

{% block content %}
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <div>
            <div class="text-uppercase small font-weight-bold text-sena mb-2">Perfil instructor</div>
            <h1 class="h3 mb-0 text-gray-800">Cambiar contraseña</h1>
        </div>
        <a href="{{ url_for('dashboard', role_slug='instructor') }}" class="btn btn-outline-success btn-sm shadow-sm">
            <i class="fas fa-arrow-left fa-sm mr-1"></i> Volver al dashboard
        </a>
    </div>

    {% include 'components/flash_messages.html' %}

    <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-8">
            <div class="card shadow border-0">
                <div class="card-header py-3 border-bottom-sena">
                    <h6 class="m-0 font-weight-bold text-sena">Actualiza tus credenciales de acceso</h6>
                </div>
                <div class="card-body">
                    <form method="post" action="{{ url_for('instructor_change_password') }}">
                        <div class="form-group">
                            <label for="current_password">Contraseña actual</label>
                            <input type="password" class="form-control" id="current_password" name="current_password" required>
                        </div>
                        <div class="form-group">
                            <label for="new_password">Nueva contraseña</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" required>
                            <small class="form-text text-muted">Debe tener al menos 8 caracteres.</small>
                        </div>
                        <div class="form-group">
                            <label for="confirm_password">Confirmar nueva contraseña</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                        <button type="submit" class="btn btn-sena btn-block">Guardar nueva contraseña</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
